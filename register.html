<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ลงทะเบียน - บ้านตะกุย</title>
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
  <style>
    body { display: flex; flex-direction: column; align-items: center; padding: 20px; background: #e8f5e9; }
    #v-box { position: relative; border: 4px solid #fff; border-radius: 10px; line-height: 0; }
  </style>
</head>
<body>
  <h4>ลงทะเบียนใบหน้านักเรียน</h4>
  <div id="v-box"><video id="video" width="400" height="300" autoplay muted playsinline></video></div>
  <div class="card-panel" style="width: 100%; max-width: 400px;">
    <input type="text" id="stdId" placeholder="เลขประจำตัวนักเรียน">
    <button class="btn green w100" style="width:100%" onclick="reg()">บันทึกใบหน้า</button>
    <p id="msg" class="center"></p>
    <p class="center"><a href="index.html">ไปหน้าเช็คชื่อ</a></p>
  </div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbyoRn013tg6FOGk07GkBA09I1Z90BvAGgJWFGn9guqZhnSVZhsH1MrqNMdNPgdqIF07/exec";
  const video = document.getElementById('video');
  const msg = document.getElementById('msg');

  async function init() {
    if (typeof faceapi === 'undefined') { setTimeout(init, 1000); return; }
    msg.innerText = "กำลังโหลด AI...";
    const URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights/';
    await Promise.all([
      faceapi.nets.ssdMobilenetv1.loadFromUri(URL),
      faceapi.nets.faceLandmark68Net.loadFromUri(URL),
      faceapi.nets.faceRecognitionNet.loadFromUri(URL)
    ]);
    const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
    video.srcObject = stream;
    msg.innerText = "พร้อมใช้งาน";
  }

async function reg() {
  const id = document.getElementById('stdId').value;
  if(!id) return alert("ใส่เลขประจำตัวด้วยครับ");

  if (video.paused || video.ended) return alert("กรุณารอกล้องทำงานสักครู่");

  msg.innerText = "กำลังสแกนใบหน้าและจับภาพ...";
  
  // 1. ตรวจจับใบหน้าและ Descriptor ตามปกติ
  const d = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
  
  if(!d) {
    msg.innerText = "ไม่พบใบหน้า! ลองขยับหน้าให้อยู่กลางจอ";
    return;
  }
  
  // --- ส่วนที่เพิ่ม: จับภาพ (Capture Image) ---
  const canvas = document.createElement('canvas'); // สร้าง Canvas ชั่วคราว
  canvas.width = video.width;
  canvas.height = video.height;
  canvas.getContext('2d').drawImage(video, 0, 0); // วาดภาพจากวิดีโอลง Canvas
  
  // แปลงภาพเป็น Base64 String (JPEG ความละเอียด 0.7)
  const imageBase64 = canvas.toDataURL('image/jpeg', 0.7); 
  // ---------------------------------------------
  
  msg.innerText = "กำลังส่งข้อมูลลง Sheet และ Upload รูป...";
  
  // 2. แก้ไขข้อมูลใน Fetch BODY: เพิ่ม 'imageContent'
  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      body: JSON.stringify({ 
        action: "register", 
        id: id, 
        descriptor: Array.from(d.descriptor),
        imageContent: imageBase64 // --- ส่งไฟล์ภาพ (Base64) ไปด้วย (ใหม่) ---
      })
    });
    msg.innerText = await res.text();
  } catch (err) {
    msg.innerText = "Error: " + err.message;
    console.error(err);
  }
}
  window.onload = init;
</script>
</body>
</html>
