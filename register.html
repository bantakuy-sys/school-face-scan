<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ลงทะเบียน - บ้านตะกุย</title>
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
  <style>
    body { display: flex; flex-direction: column; align-items: center; padding: 20px; background: #e8f5e9; font-family: sans-serif; }
    #v-box { position: relative; border: 5px solid #fff; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.2); line-height: 0; }
    .container-card { width: 100%; max-width: 450px; margin-top: 20px; }
  </style>
</head>
<body>
  <h4>ลงทะเบียนใบหน้า</h4>
  <div id="v-box"><video id="video" width="400" height="300" autoplay muted playsinline></video></div>
  
  <div class="container-card card-panel">
    <div class="input-field">
      <input type="text" id="stdId" placeholder="กรอกเลขประจำตัวนักเรียน">
    </div>
    <button class="btn green waves-effect" style="width:100%" onclick="reg()">บันทึกข้อมูลและใบหน้า</button>
    <p id="msg" class="center-align" style="margin-top:15px; font-weight:bold;"></p>
    <div class="center-align"><a href="index.html">กลับไปหน้าเช็คชื่อ</a></div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbybrCmpU81AGnioHLuUTLq7tJPlue_xmVcIxIJwgaHLWdVZ72215mf3IlXicg_ibbJX/exec";
    const video = document.getElementById('video');
    const msg = document.getElementById('msg');

    async function init() {
      msg.innerText = "กำลังโหลด AI...";
      const URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights/';
      await Promise.all([
        faceapi.nets.ssdMobilenetv1.loadFromUri(URL),
        faceapi.nets.faceLandmark68Net.loadFromUri(URL),
        faceapi.nets.faceRecognitionNet.loadFromUri(URL)
      ]);
      const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
      video.srcObject = stream;
      msg.innerText = "ระบบพร้อมลงทะเบียน";
    }

async function reg() {
  const id = document.getElementById('stdId').value.trim();
  if(!id) return alert("กรุณาระบุเลขประจำตัว");
  
  msg.innerText = "กำลังสแกนใบหน้าและจับภาพ...";
  const d = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
  
  if(!d) {
    msg.innerText = "ไม่พบใบหน้า! กรุณาขยับหน้าให้ตรงกล้อง";
    return;
  }

  // --- ส่วนการจับภาพและบีบอัด (แก้ไขใหม่) ---
  const canvas = document.createElement('canvas');
  canvas.width = 320;  // ลดขนาดเหลือ 320px
  canvas.height = 240; // ลดขนาดเหลือ 240px
  const ctx = canvas.getContext('2d');
  
  // กลับด้านรูปภาพให้ตรงกับวิดีโอ (ถ้าคุณ Mirror วิดีโอไว้)
  ctx.translate(canvas.width, 0);
  ctx.scale(-1, 1);
  ctx.drawImage(video, 0, 0, 320, 240);
  
  // แปลงเป็น JPEG คุณภาพ 0.5 (ไฟล์จะเล็กมากแต่ยังเห็นหน้าชัด)
  const imgBase64 = canvas.toDataURL('image/jpeg', 0.5);

  msg.innerText = "กำลังส่งข้อมูล...";
  
  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      body: JSON.stringify({ 
        action: "register", 
        id: id, 
        descriptor: Array.from(d.descriptor),
        imageContent: imgBase64 
      })
    });
    
    const resultText = await res.text();
    msg.innerText = resultText;
  } catch (err) {
    msg.innerText = "ส่งข้อมูลไม่สำเร็จ: " + err.message;
  }
}
}
    window.onload = init;
  </script>
</body>
</html>
