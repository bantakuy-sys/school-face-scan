<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบเช็คชื่อสแกนใบหน้า - บ้านตะกุย</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  
  <style>
    body { display: flex; flex-direction: column; align-items: center; background: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding-bottom: 50px; }
    #video-container { position: relative; margin-top: 20px; border: 8px solid #fff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); overflow: hidden; line-height: 0; background: #000; }
    canvas { position: absolute; top: 0; left: 0; z-index: 10; }
    video { display: block; filter: scaleX(-1); } /* Mirror video สำหรับการใช้งานที่คุ้นเคย */
    .info-card { width: 90%; max-width: 600px; margin-top: 20px; border-radius: 15px !important; }
    .status-badge { padding: 5px 15px; border-radius: 20px; font-weight: bold; }
    #verifyPhoto { width: 200px; height: 200px; object-fit: cover; border-radius: 50%; border: 5px solid #2196f3; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
  </style>
</head>
<body>

  <div class="info-card card white z-depth-2">
    <div class="card-content center">
      <span class="card-title blue-text text-darken-2"><b>ระบบเช็คชื่อสแกนใบหน้า (บ้านตะกุย)</b></span>
      <p id="status" class="grey-text text-darken-1">กำลังเตรียมระบบ...</p>
    </div>
  </div>

  <div id="video-container">
    <video id="video" width="640" height="480" autoplay muted playsinline></video>
  </div>

  <div style="margin-top:25px;">
    <a href="register.html" class="btn-flat waves-effect blue-text"><i class="material-icons left">person_add</i>ไปหน้าลงทะเบียน</a>
  </div>

  <div id="verifyModal" class="modal">
    <div class="modal-content center">
      <h4 class="blue-text">เช็คชื่อสำเร็จ!</h4>
      <img id="verifyPhoto" src="" alt="Student Photo">
      <h5 id="verifyName" style="margin-top:15px; font-weight:bold;">-</h5>
      <p>ID: <span id="verifyId">-</span></p>
    </div>
    <div class="modal-footer">
      <a href="#!" class="modal-close waves-effect waves-green btn blue">ตกลง</a>
    </div>
  </div>

<script>
  // *** ใส่ URL Web App ของคุณที่นี่ ***
  const GAS_URL = "https://script.google.com/macros/s/AKfycbxtq3lpW_Qk7rGDRpu99SDyZM_lYasBYa-Q8kTdu7MRmpGvPoSlRRFp4EQ3vEopMRjj1A/exec";
  
  const video = document.getElementById('video');
  const status = document.getElementById('status');
  let faceMatcher;
  let studentsData = [];
  let lastScan = "";
  let lastTime = 0;

  async function init() {
    // 1. ตรวจสอบ Library
    if (typeof faceapi === 'undefined') {
      status.innerText = "กำลังโหลด Library...";
      setTimeout(init, 1000);
      return;
    }

    try {
      // 2. โหลด AI Models
      status.innerHTML = '<span class="status-badge orange white-text">กำลังโหลดสมอง AI...</span>';
      const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights/';
      await Promise.all([
        faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
        faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
        faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
      ]);

      // 3. ดึงข้อมูลนักเรียนจาก Google Sheets
      status.innerHTML = '<span class="status-badge blue white-text">กำลังเชื่อมต่อฐานข้อมูล...</span>';
      const res = await fetch(GAS_URL);
      studentsData = await res.json();

      if (!studentsData || studentsData.length === 0) {
        status.innerHTML = "<span class='red-text'><b>ไม่พบข้อมูลนักเรียนที่มีใบหน้าในระบบ</b></span>";
        return;
      }
