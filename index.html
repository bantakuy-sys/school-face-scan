<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบเช็คชื่อสแกนใบหน้า - โรงเรียนบ้านตะกุย(ค้ำคูณบำรุง)</title>
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    body { display: flex; flex-direction: column; align-items: center; background: #f4f7f6; padding-top: 20px; font-family: 'Kanit', sans-serif; }
    #login-page { display: flex; height: 80vh; align-items: center; justify-content: center; }
    #main-page { display: none; width: 95%; max-width: 1200px; }
    #video-wrap { position: relative; border: 8px solid #fff; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); overflow: hidden; background: #000; width: 640px; height: 480px; margin: auto; }
    canvas { position: absolute; top: 0; left: 0; }
    .container-card { padding: 20px; border-radius: 15px; }
    .log-table { margin-top: 20px; background: white; border-radius: 10px; padding: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .cam-controls { margin: 15px 0; }
  </style>
</head>
<body>

  <div id="login-page">
    <div class="card-panel center" style="width: 350px; border-radius: 15px;">
      <h5 class="green-text text-darken-2">เข้าสู่ระบบตรวจสอบ</h5>
      <p class="grey-text">ระบบเช็คชื่อสแกนใบหน้า (Teacher / Staff)</p>
      <div class="input-field"><input type="text" id="user" placeholder="ชื่อผู้ใช้งาน (Username)"></div>
      <div class="input-field"><input type="password" id="pass" placeholder="รหัสผ่าน (Password)"></div>
      <button class="btn green darken-2 waves-effect waves-light" onclick="login()" style="width: 100%; border-radius: 8px;">เข้าสู่ระบบ</button>
    </div>
  </div>

  <div id="main-page">
    <div class="row">
      <div class="col s12 m6 center-align">
        <div id="video-wrap">
          <video id="video" width="640" height="480" autoplay muted playsinline></video>
        </div>
        <div class="cam-controls">
          <button class="btn blue waves-effect" onclick="toggleCamera()"><i class="material-icons left">videocam</i> เปิด/ปิดกล้อง</button>
          <button class="btn orange waves-effect" onclick="switchCamera()"><i class="material-icons left">cameraswitch</i> สลับกล้อง</button>
        </div>
      </div>

      <div class="col s12 m6">
        <div class="card-panel container-card">
          <div class="chip green white-text">
            <i class="material-icons field-icon" style="vertical-align: middle; font-size: 16px;">account_circle</i>
            <span id="user-info">กำลังโหลด...</span>
          </div>
          <a href="#" onclick="logout()" class="red-text right" style="margin-top:5px; font-weight:bold;">ออกจากระบบ</a>
          
          <h6 style="margin-top: 20px; font-weight: bold;">เลือกรายวิชาเรียน:</h6>
          <div class="input-field">
            <select id="subjectSelect" class="browser-default" style="border-radius: 8px; border: 1px solid #2e7d32; padding: 10px; width: 100%;">
              <option value="มาเรียน">-- บันทึก 'มาเรียน' ปกติ (ไม่มีวิชา) --</option>
            </select>
          </div>
          <p id="status" class="orange-text font-weight: bold;">กำลังโหลด AI Model...</p>
          <div style="margin-top: 10px;">
            <a href="register.html" class="blue-text" style="text-decoration: underline;">ลงทะเบียนใบหน้านักเรียนใหม่</a>
          </div>
        </div>

        <div class="log-table">
          <h6 class="center-align" style="font-weight: bold; color: #2e7d32;">ประวัติการสแกนล่าสุด (10 รายการ)</h6>
          <table class="centered striped responsive-table">
            <thead>
              <tr>
                <th>เวลา</th>
                <th>ชื่อ-สกุล</th>
                <th>วิชา</th>
                <th>จัดการ</th>
              </tr>
            </thead>
            <tbody id="log-body">
              <tr><td colspan="4" class="grey-text">ไม่มีข้อมูลล่าสุด</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div id="modalConfirm" class="modal" style="border-radius: 15px; max-width: 450px;">
    <div class="modal-content center">
      <h4 id="resTitle" class="green-text">เช็คชื่อสำเร็จ</h4>
      <img id="popImg" style="width: 130px; height: 130px; border-radius: 50%; object-fit: cover; border: 4px solid #2e7d32; margin-top: 10px;" src="">
      <h5 id="popName" style="margin-top: 15px;"></h5>
      <p id="popId" style="font-size: 1.1rem; color: #555;"></p>
      <p id="popStatus" class="blue-text" style="font-weight: bold; font-size: 1.2rem;"></p>
    </div>
    <div class="modal-footer">
      <a href="#!" class="modal-close btn green darken-2">ตกลง</a>
    </div>
  </div>

  <script>
    // แทนที่ด้วย URL Web App ของคุณที่ Deploy ล่าสุด
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzZSZtlZFaIsSbLk0q-YVkQXou9fZSRZgARmj3xNpfM7ge1s_MQDpfGwsEnTajaxUjc/exec";
    
    const video = document.getElementById('video');
    const status = document.getElementById('status');
    let currentStream = null, useFacingMode = "user";
    let faceMatcher, studentsData = [], lastScan = "", lastTime = 0, scanInterval = null;

    // ตรวจสอบ Session เก่าเมื่อโหลดหน้าเว็บ
    window.onload = () => {
      const savedUser = sessionStorage.getItem("user");
      if (savedUser) {
        const data = JSON.parse(savedUser);
        document.getElementById('login-page').style.display = 'none';
        document.getElementById('main-page').style.display = 'block';
        document.getElementById('user-info').innerText = `${data.name} (${data.role})`;
        init();
      }
    };

    // --- 1. ระบบ Login ---
    async function login() {
      const u = document.getElementById('user').value.trim();
      const p = document.getElementById('pass').value.trim();
      if(!u || !p) return alert("กรุณากรอกข้อมูลให้ครบถ้วน");
      
      try {
        const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "login", username: u, password: p }) });
        const data = await res.json();
        if (data.status === "success") {
          sessionStorage.setItem("user", JSON.stringify(data));
          document.getElementById('login-page').style.display = 'none';
          document.getElementById('main-page').style.display = 'block';
          document.getElementById('user-info').innerText = `${data.name} (${data.role})`;
          init();
        } else { 
          alert("ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง"); 
        }
      } catch(e) {
        alert("เกิดข้อผิดพลาดในการเชื่อมต่อระบบล็อกอิน");
      }
    }

    function logout() { 
      sessionStorage.clear(); 
      location.reload(); 
    }

    // --- 2. ควบคุมและเปิดกล้อง ---
    async function startVideo() {
      if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
      }
      try {
        currentStream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: useFacingMode, width: 640, height: 480 } 
        });
        video.srcObject = currentStream;
        
        // ผูกสคริปต์สแกนใบหน้าเข้ากับ Event ตอนกล้องเริ่มเล่นภาพ (ย้ายระบบลูปมาไว้ที่นี่เพื่อให้ Canvas ทำงานถูกต้อง)
        video.onplaying = () => {
          status.innerText = "ระบบพร้อมสแกนใบหน้า";
          status.className = "green-text";
          
          // ลบ Canvas เก่าทิ้งถ้ามีการสลับกล้อง
          const oldCanvas = document.querySelector('canvas');
          if (oldCanvas) oldCanvas.remove();

          const canvas = faceapi.createCanvasFromMedia(video);
          document.getElementById('video-wrap').append(canvas);
          const size = { width: video.videoWidth || 640, height: video.videoHeight || 480 };
          faceapi.matchDimensions(canvas, size);

          if (scanInterval) clearInterval(scanInterval);
          
          // ลูปจับใบหน้าและวาดกรอบสี่เหลี่ยม ทุกๆ 1 วินาที
          scanInterval = setInterval(async () => {
            if (video.paused || !faceMatcher) return;
            
            const detects = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
            const resized = faceapi.resizeResults(detects, size);
            
            // เคลียร์ภาพวาดกรอบเก่าออกก่อน
            canvas.getContext('2d').clearRect(0, 0, size.width, size.height);
            
            resized.forEach(d => {
              const result = faceMatcher.findBestMatch(d.descriptor);
              const label = result.label === 'unknown' ? 'ไม่รู้จัก' : result.label;
              const color = result.label === 'unknown' ? 'red' : '#2e7d32';
              
              // วาดกรอบบนหน้าจอเหมือนโค้ดเดิมของคุณ
              new faceapi.draw.DrawBox(d.detection.box, { label: label, boxColor: color }).draw(canvas);
              
              if (result.label !== 'unknown') {
                handleMatch(result.label);
              }
            });
          }, 1000);
        };

      } catch (e) { 
        status.innerText = "ไม่สามารถเข้าถึงกล้องได้: " + e.message;
        status.className = "red-text";
      }
    }

    function toggleCamera() {
      if (video.paused) video.play(); else video.pause();
    }

    function switchCamera() {
      useFacingMode = (useFacingMode === "user") ? "environment" : "user";
      startVideo();
    }

    // --- 3. โหลดโครงสร้างและฐานข้อมูล ---
    async function init() {
      const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights/';
      try {
        // โหลด AI Model
        await Promise.all([
          faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
          faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
          faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
        ]);
        
        // โหลดรายวิชาจากหน้าชีต subject
        status.innerText = "กำลังโหลดข้อมูลวิชาเรียน...";
        const resSub = await fetch(GAS_URL + "?action=getSubjects");
        const subjects = await resSub.json();
        const subjectSelect = document.getElementById('subjectSelect');
        
        subjects.forEach(sub => {
          const opt = document.createElement('option');
          opt.value = sub;
          opt.innerText = sub;
          subjectSelect.appendChild(opt);
        });

        // โหลดข้อมูลรายชื่อนักเรียน
        status.innerText = "กำลังเชื่อมต่อฐานข้อมูลนักเรียน...";
        const res = await fetch(GAS_URL);
        studentsData = await res.json();

        const labeled = studentsData.map(s => {
          if(!s.descriptor) return null;
          const desc = Array.isArray(s.descriptor) ? s.descriptor : Object.values(s.descriptor);
          return new faceapi.LabeledFaceDescriptors(s.name, [new Float32Array(desc)]);
        }).filter(x => x);

        faceMatcher = new faceapi.FaceMatcher(labeled, 0.5);
        M.Modal.init(document.querySelectorAll('.modal'));
        
        startVideo();
        updateLogs();
      } catch (err) {
        status.innerText = "ระบบโหลดผิดพลาด: " + err.message;
        status.className = "red-text";
      }
    }

    // --- 4. บันทึกผลเมื่อใบหน้าตรงกับฐานข้อมูล ---
    async function handleMatch(name) {
      if (name === lastScan && Date.now() - lastTime < 8000) return; // ล็อค 8 วินาทีป้องกันสแกนซ้ำถี่ๆ
      lastScan = name; 
      lastTime = Date.now();
      
      const std = studentsData.find(s => s.name === name);
      if (!std) return;

      const subject = document.getElementById('subjectSelect').value;
      
      // ดึง Modal ข้อมูลขึ้นมาโชว์ก่อนส่งข้อมูล
      document.getElementById('popImg').src = std.photoUrl || 'https://via.placeholder.com/150';
      document.getElementById('popName').innerText = std.name;
      document.getElementById('popId').innerText = `รหัสประจำตัว: ${std.id} | ชั้นเรียน: ${std.stdClass || '-'}`;
      document.getElementById('popStatus').innerText = "กำลังส่งข้อมูลบันทึกเวลา...";
      
      const modal = M.Modal.getInstance(document.getElementById('modalConfirm'));
      modal.open();

      try {
        const response = await fetch(GAS_URL, { 
          method: "POST", 
          body: JSON.stringify({ id: std.id, subject: subject }) 
        });
        const resultText = await response.text();
        
        document.getElementById('popStatus').innerText = resultText;
        
        if (resultText.includes("ไปแล้ว")) {
          document.getElementById('resTitle').innerText = "บันทึกซ้ำ";
          document.getElementById('resTitle').className = "orange-text";
        } else {
          document.getElementById('resTitle').innerText = "เช็คชื่อสำเร็จ";
          document.getElementById('resTitle').className = "green-text";
        }

        // ระบบเสียงพูดจำลอง TTS
        const speechMsg = resultText.includes("ไปแล้ว") ? `คุณ ${name} เช็คชื่อวิชานี้ไปแล้วค่ะ` : `คุณ ${name} เช็คชื่อสำเร็จค่ะ`;
        const talk = new SpeechSynthesisUtterance(speechMsg);
        talk.lang = 'th-TH';
        window.speechSynthesis.speak(talk);

        updateLogs(); // อัปเดตตารางสรุปด้านล่างทันที
      } catch (e) {
        document.getElementById('popStatus').innerText = "ล้มเหลว: ไม่สามารถส่งข้อมูลหาคลาวด์ได้";
      }
      
      setTimeout(() => modal.close(), 3500);
    }

    // --- 5. ดึงตารางประวัติเช็คชื่อล่าสุด ---
    async function updateLogs() {
      try {
        const res = await fetch(GAS_URL + "?action=getLogs");
        const logs = await res.json();
        let html = "";
        
        if(logs.length === 0) {
          html = '<tr><td colspan="4" class="grey-text">ไม่มีข้อมูลล่าสุดของวันนี้</td></tr>';
        } else {
          logs.forEach(l => {
            html += `<tr>
              <td><b class="blue-text">${l.timestamp}</b></td>
              <td>${l.name}</td>
              <td><span class="chip font-weight:bold">${l.subject}</span></td>
              <td><button class="btn-small red waves-effect" onclick="deleteRecord(${l.row})"><i class="material-icons">delete</i></button></td>
            </tr>`;
          });
        }
        document.getElementById('log-body').innerHTML = html;
      } catch(e) {
        console.log("โหลดประวัติการเช็คชื่อไม่สำเร็จ");
      }
    }

    // --- 6. ฟังก์ชันลบข้อมูลแถวล่าสุดออกจาก Google Sheet ---
    async function deleteRecord(rowId) {
      if (!confirm("คุณแน่ใจใช่หรือไม่ว่าต้องการลบแถวบันทึกนี้? (กรณีสแกนพลาด)")) return;
      
      status.innerText = "กำลังทำการลบแถวข้อมูล...";
      try {
        const res = await fetch(GAS_URL, { 
          method: 'POST', 
          body: JSON.stringify({ action: "deleteAttendance", row: rowId }) 
        });
        const msg = await res.text();
        alert(msg);
        updateLogs();
        status.innerText = "ระบบพร้อมสแกนใบหน้า";
      } catch(e) {
        alert("ไม่สามารถลบแถวข้อมูลได้");
      }
    }
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
</body>
</html>
