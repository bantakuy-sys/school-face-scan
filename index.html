<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>เช็คชื่อสแกนใบหน้า - บ้านตะกุย</title>
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
  <style>
    body { display: flex; flex-direction: column; align-items: center; background: #f4f7f6; padding-top: 20px; }
    #video-wrap { position: relative; border: 8px solid #fff; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); overflow: hidden; }
    canvas { position: absolute; top: 0; left: 0; }
    .student-img { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 4px solid #2196f3; }
  </style>
</head>
<body>
  <div class="card-panel center" style="width: 90%; max-width: 600px;">
    <h5 class="blue-text">ระบบเช็คชื่อสแกนใบหน้า</h5>
    <p id="status">โหลดระบบ...</p>
  </div>
  <div class="container-card card-panel">
  <div class="input-field">
    <select id="subjectSelect" class="browser-default" style="border-radius: 8px; border: 1px solid #2e7d32; padding: 10px;">
      <option value="">-- เลือกรายวิชา (ถ้าไม่มีจะบันทึก 'มาเรียน' ของวัน) --</option>
      <option value="ภาษาไทย">ภาษาไทย</option>
      <option value="คณิตศาสตร์">คณิตศาสตร์</option>
      <option value="วิทยาศาสตร์และเทคโนโลยี">วิทยาศาสตร์และเทคโนโลยี</option>
      <option value="การออกแบและเทคโนโลยี">การออกแบและเทคโนโลยี</option>
      <option value="สังคมศึกษา ศาสนาและวัฒนธรรม">สังคมศึกษา ศาสนาและวัฒนธรรม</option>
      <option value="ประวัติศาสตร์">ประวัติศาสตร์</option>
      <option value="หน้าที่พลเมือง">หน้าที่พลเมือง</option>
      <option value="การต่อต้านการทุจริต">การต่อต้านการทุจริต</option>
      <option value="สุขศึกษาและพลศึกษา">สุขศึกษาและพลศึกษา</option>
      <option value="ศิลปะ">ศิลปะ</option>
      <option value="การงานอาชีพ">การงานอาชีพ</option>
      <option value="ภาษาอังกฤษ">ภาษาอังกฤษ</option>
      <option value="ทักษะอาชีพ">ทักษะอาชีพ</option>
    </select>
  </div>
</div>

  <div id="video-wrap">
    <video id="video" width="640" height="480" autoplay muted playsinline></video>
  </div>

  <div id="modalConfirm" class="modal">
    <div class="modal-content center">
      <h4 class="green-text">เช็คชื่อสำเร็จ</h4>
      <img id="popImg" class="student-img" src="">
      <h5 id="popName"></h5>
      <p id="popId"></p>
    </div>
    <div class="modal-footer"><a href="#!" class="modal-close btn blue">ตกลง</a></div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzQfr26agqpFFTe-h_zAnm99UxLMNzBRKMFQ1aZAihjCTnfFfBMtKuxRr0cxeqq0xK6/exec";
    const video = document.getElementById('video');
    const status = document.getElementById('status');
    let faceMatcher, studentsData = [], lastScan = "", lastTime = 0;

    async function init() {
      const URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights/';
      await Promise.all([
        faceapi.nets.ssdMobilenetv1.loadFromUri(URL),
        faceapi.nets.faceLandmark68Net.loadFromUri(URL),
        faceapi.nets.faceRecognitionNet.loadFromUri(URL)
      ]);
      
      status.innerText = "ดึงข้อมูลนักเรียน...";
      const res = await fetch(GAS_URL);
      studentsData = await res.json();
      
      const labeled = studentsData.map(s => {
        const desc = Array.isArray(s.descriptor) ? s.descriptor : Object.values(s.descriptor);
        return new faceapi.LabeledFaceDescriptors(s.name, [new Float32Array(desc)]);
      }).filter(x => x);

      faceMatcher = new faceapi.FaceMatcher(labeled, 0.5);
      M.Modal.init(document.querySelectorAll('.modal'));
      startVideo();
    }

async function startVideo() {
      const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
      video.srcObject = stream;
      video.onplaying = () => {
        status.innerText = "พร้อมสแกน";
        const canvas = faceapi.createCanvasFromMedia(video);
        document.getElementById('video-wrap').append(canvas);
        const size = { width: video.width, height: video.height };
        faceapi.matchDimensions(canvas, size);

        setInterval(async () => {
          const detects = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
          const resized = faceapi.resizeResults(detects, size);
          canvas.getContext('2d').clearRect(0, 0, size.width, size.height);
          
          resized.forEach(d => {
            const result = faceMatcher.findBestMatch(d.descriptor);
            new faceapi.draw.DrawBox(d.detection.box, { label: result.toString(), boxColor: result.label === 'unknown' ? 'red' : 'green' }).draw(canvas);
            if(result.label !== 'unknown') handleMatch(result.label);
          });
        }, 1000);
      };
    }
    function handleMatch(name) {
      if (name === lastScan && Date.now() - lastTime < 10000) return;
      lastScan = name; lastTime = Date.now();
      const subject = document.getElementById('subjectSelect').value;
      const std = studentsData.find(s => s.name === name);
      document.getElementById('popImg').src = std.photoUrl || '';
      document.getElementById('popName').innerText = std.name;
      document.getElementById('popId').innerText = "ID: " + std.id;
      M.Modal.getInstance(document.getElementById('modalConfirm')).open();

      const talk = new SpeechSynthesisUtterance("สวัสดีครับคุณ " + name);
      talk.lang = 'th-TH'; window.speechSynthesis.speak(talk);

      fetch(GAS_URL, { 
    method: "POST", 
    body: JSON.stringify({ 
      name: name, 
      id: std.id,
      subject: subject // ส่งชื่อวิชาไปด้วย
    }) 
});
      setTimeout(() => M.Modal.getInstance(document.getElementById('modalConfirm')).close(), 3000);
    }
    window.onload = init;
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
</body>
</html>
